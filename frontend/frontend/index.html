<!DOCTYPE html>
<html>

<head>

    <title>Business Dashboard</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="container mt-5">

    <h1 class="mb-4">Business Dashboard</h1>

    <!-- Dashboard Cards -->

    <div class="row mb-4">

        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <h3>Total Businesses</h3>
                    <h1 id="totalBusinesses">0</h1>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <h3>Total Cities</h3>
                    <h1 id="totalCities">0</h1>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <h3>Total Categories</h3>
                    <h1 id="totalCategories">0</h1>
                </div>
            </div>
        </div>

    </div>

    <!-- Category Chart -->

    <div class="card mb-4">
        <div class="card-body">
            <h4>Businesses by Category</h4>
            <canvas id="categoryChart"></canvas>
        </div>
    </div>

    <!-- City Chart -->

    <div class="card mb-4">
        <div class="card-body">
            <h4>Businesses by City</h4>
            <canvas id="cityChart"></canvas>
        </div>
    </div>

    <h3>Add Business</h3>

<input type="text" id="business_name"
class="form-control mb-2"
placeholder="Business Name">

<input type="text" id="new_city"
class="form-control mb-2"
placeholder="City">

<input type="text" id="new_category"
class="form-control mb-2"
placeholder="Category">

<input type="text" id="new_address"
class="form-control mb-2"
placeholder="Address">

<input type="text" id="new_phone"
class="form-control mb-2"
placeholder="Phone">

<input type="text" id="new_source"
class="form-control mb-2"
placeholder="Source">

<button
class="btn btn-success"
onclick="addBusiness()">
Add Business
</button>
<br><br>

    <!-- Filters -->

    <input
        type="text"
        id="city"
        class="form-control mb-3"
        placeholder="Enter City">

    <select
        id="category"
        class="form-control mb-3">

        <option value="">Select Category</option>
        <option value="Hospital">Hospital</option>
        <option value="Cafe">Cafe</option>
        <option value="School">School</option>
        <option value="Gym">Gym</option>
        <option value="Restaurant">Restaurant</option>

    </select>

    <button
        class="btn btn-primary"
        onclick="searchBusiness()">

        Search

    </button>

    <br><br>

    <!-- Results Table -->

    <table class="table table-bordered">

        <thead>

            <tr>
                <th>Name</th>
                <th>Category</th>
                <th>City</th>
                <th>Phone</th>
            </tr>

        </thead>

        <tbody id="results">

        </tbody>

    </table>

<script>

async function loadDashboard() {

    // Total Businesses

    let totalResponse =
        await fetch("http://127.0.0.1:8000/total-count");

    let totalData =
        await totalResponse.json();

    document.getElementById("totalBusinesses").innerText =
        totalData.total;


    // Total Cities

    let cityResponse =
        await fetch("http://127.0.0.1:8000/city-count");

    let cityData =
        await cityResponse.json();

    document.getElementById("totalCities").innerText =
        cityData.length;


    // Total Categories

    let categoryResponse =
        await fetch("http://127.0.0.1:8000/category-count");

    let categoryData =
        await categoryResponse.json();

    document.getElementById("totalCategories").innerText =
        categoryData.length;


    // Category Chart

    let categoryLabels =
        categoryData.map(item => item.category);

    let categoryCounts =
        categoryData.map(item => item.count);

    new Chart(
        document.getElementById("categoryChart"),
        {
            type: "bar",

            data: {
                labels: categoryLabels,

                datasets: [{
                    label: "Businesses",
                    data: categoryCounts
                }]
            }
        }
    );


    // City Chart

    let cityLabels =
        cityData.map(item => item.city);

    let cityCounts =
        cityData.map(item => item.count);

    new Chart(
        document.getElementById("cityChart"),
        {
            type: "pie",

            data: {
                labels: cityLabels,

                datasets: [{
                    data: cityCounts
                }]
            }
        }
    );

}



async function searchBusiness() {

    let city =
        document.getElementById("city").value;

    let category =
        document.getElementById("category").value;

    let response =
        await fetch(
            `http://127.0.0.1:8000/filter?city=${city}&category=${category}`
        );

    let data =
        await response.json();

    let rows = "";

    data.forEach(item => {

        rows += `
        <tr>
            <td>${item.business_name}</td>
            <td>${item.category}</td>
            <td>${item.city}</td>
            <td>${item.phone}</td>
        </tr>
        `;

    });

    document.getElementById("results").innerHTML =
        rows;

}

async function addBusiness() {

    let business = {

        business_name:
        document.getElementById("business_name").value,

        city:
        document.getElementById("new_city").value,

        category:
        document.getElementById("new_category").value,

        address:
        document.getElementById("new_address").value,

        phone:
        document.getElementById("new_phone").value,

        source:
        document.getElementById("new_source").value
    };

    let response = await fetch(
        "http://127.0.0.1:8000/add-business",
        {
            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify(business)
        }
    );

    let data = await response.json();

    alert(data.message);
}

loadDashboard();

</script>

</body>
</html>
